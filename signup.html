<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Architecture Titans — WMSU Student Success Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     AUTH SCREEN - SIGNUP ONLY
══════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">

    <!-- BRAND PANEL -->
    <div class="auth-brand">
      <!-- Helmet SVG -->
      <svg class="brand-helmet" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hg1" cx="50%" cy="40%"><stop offset="0%" stop-color="#F5C200"/><stop offset="100%" stop-color="#8B6F00"/></radialGradient>
        </defs>
        <!-- plume -->
        <path d="M50,8 C40,6 28,10 24,20 C30,16 40,16 50,20" fill="#C9A200" opacity=".6"/>
        <path d="M50,8 C60,6 72,10 76,20 C70,16 60,16 50,20" fill="#C9A200" opacity=".6"/>
        <path d="M50,5 L44,22 L50,20 L56,22 Z" fill="url(#hg1)"/>
        <!-- crest base -->
        <rect x="44" y="18" width="12" height="6" rx="2" fill="#A67C00"/>
        <!-- helmet bowl -->
        <path d="M20,42 C20,25 33,18 50,18 C67,18 80,25 80,42 L80,55 C80,60 76,63 72,63 L28,63 C24,63 20,60 20,55 Z" fill="url(#hg1)"/>
        <!-- visor -->
        <path d="M26,50 L74,50 L72,63 L28,63 Z" fill="#8B6F00" opacity=".7"/>
        <!-- cheek guard left -->
        <path d="M20,42 L16,58 C16,62 20,65 24,64 L28,63 L20,55 Z" fill="#C9A200" opacity=".8"/>
        <!-- cheek guard right -->
        <path d="M80,42 L84,58 C84,62 80,65 76,64 L72,63 L80,55 Z" fill="#C9A200" opacity=".8"/>
        <!-- neck guard -->
        <rect x="28" y="62" width="44" height="8" rx="2" fill="#8B6F00"/>
        <!-- eye slot -->
        <rect x="28" y="44" width="44" height="8" rx="3" fill="#1c1810" opacity=".8"/>
        <!-- highlight -->
        <path d="M32,28 C36,24 44,22 50,22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
        <!-- sword cross -->
        <line x1="14" y1="70" x2="86" y2="70" stroke="#C9A200" stroke-width="3" stroke-linecap="round" opacity=".5"/>
        <line x1="50" y1="58" x2="50" y2="90" stroke="#C9A200" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
        <rect x="44" y="68" width="12" height="4" rx="1" fill="#A67C00" opacity=".7"/>
      </svg>

      <div class="brand-wordmark">
        <span class="dept">Architecture</span>
        <span class="system">WMSU Titans</span>
      </div>
      <div class="brand-rule"></div>
      <div class="brand-subtitle">Student Success Predictor — College of Architecture</div>
      <div class="brand-badge">Est. WMSU</div>
    </div>

    <!-- FORM PANEL -->
    <div class="auth-form-panel">

      <!-- SIGNUP -->
      <div class="form-view active" id="v-signup">
        <div class="fv-heading">Create your account</div>
        <div class="fv-sub">Join the Architecture Titans community</div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label" for="su-fn">First name</label>
            <input class="f-input" id="su-fn" type="text" placeholder="Juan"/>
          </div>
          <div class="f-group">
            <label class="f-label" for="su-ln">Last name</label>
            <input class="f-input" id="su-ln" type="text" placeholder="Dela Cruz"/>
          </div>
        </div>
        <div class="f-group">
          <label class="f-label" for="su-email">Email address</label>
          <input class="f-input" id="su-email" type="email" placeholder="you@wmsu.edu.ph"/>
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label" for="su-id">University ID</label>
            <input class="f-input" id="su-id" type="text" placeholder="202401-01-001"/>
          </div>
          <div class="f-group">
            <label class="f-label" for="su-yr">Year level</label>
            <select class="f-select" id="su-yr">
              <option value="">Select year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
              <option>5th Year</option>
            </select>
          </div>
        </div>
        <div class="f-group">
          <label class="f-label" for="su-pass">Password</label>
          <div class="f-input-wrap">
            <input class="f-input" id="su-pass" type="password" placeholder="Create a strong password" oninput="checkPwReqs(this.value)"/>
            <button class="f-eye" onclick="toggleEye('su-pass','e-sp')" aria-label="Toggle password">
              <svg id="e-sp" class="ico" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="req-pills" id="req-pills">
            <div class="req-pill" id="r-len"><span class="dot"></span> 8+ chars</div>
            <div class="req-pill" id="r-up"><span class="dot"></span> Uppercase</div>
            <div class="req-pill" id="r-num"><span class="dot"></span> Number</div>
            <div class="req-pill" id="r-sp"><span class="dot"></span> Special char</div>
          </div>
        </div>
        <div class="f-group">
          <label class="f-label" for="su-conf">Confirm password</label>
          <input class="f-input" id="su-conf" type="password" placeholder="Re-enter your password"/>
        </div>
        <div class="terms-row">
          <input type="checkbox" id="su-terms"/>
          <label for="su-terms">I agree to the <a href="#" onclick="return false">Terms of Service</a> and <a href="#" onclick="return false">Privacy Policy</a> of WMSU Architecture Titans SSP</label>
        </div>
        <button class="btn-gold" onclick="doSignup()">Create Account</button>
        <div class="auth-switch">Already have an account? <a href="login.html" style="color:var(--gold-deeper);text-decoration:none;font-weight:500;cursor:pointer;">Login</a></div>
      </div>

    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
